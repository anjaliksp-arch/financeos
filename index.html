<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0d1117"/>
<title>FinanceOS</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d1117;--sf:#0f172a;--s2:#1e293b;--bd:#1e293b;--b2:#334155;--tx:#e2e8f0;--mu:#94a3b8;--dm:#64748b;--pr:#6366f1;--pd:#4f46e5;--gn:#4ade80;--rd:#f87171;--or:#fbbf24;--bl:#60a5fa;--pk:#f472b6}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.scr{flex:1;overflow-y:auto;padding-bottom:72px}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:17px;font-weight:700}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px;margin:12px}
.ct{font-size:12px;color:var(--dm);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.btn{background:var(--pd);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:12px;display:block;text-align:center}
.btn:active{opacity:.8}
.btn-o{background:var(--s2);border:1px solid var(--b2);color:var(--tx)}
.btn-g{background:#166534;border:1px solid var(--gn);color:var(--gn)}
.btn-r{background:#7f1d1d;border:1px solid var(--rd);color:var(--rd)}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0a0f1a;border-top:1px solid var(--bd);display:flex;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;border:none;background:none;color:var(--dm);font-size:10px;font-weight:600;gap:2px}
.tab.on{color:var(--pr)}
.tab .em{font-size:20px}
.bt{background:var(--s2);border-radius:3px;height:6px;overflow:hidden;margin:8px 0}
.bf{height:100%;border-radius:3px;background:var(--pr)}
.row{display:flex;justify-content:space-between;align-items:center}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s2);border:1px solid var(--b2)}
input,select,textarea{background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-size:15px;padding:12px 14px;width:100%;margin-top:6px;margin-bottom:14px;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--pr)}
label{font-size:12px;color:var(--mu);font-weight:500;display:block;margin-top:4px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.ms{background:var(--sf);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:8px 20px 50px}
.mh{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:12px auto 16px}
.mt{font-size:16px;font-weight:700;margin-bottom:16px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);font-size:12px;color:var(--mu);cursor:pointer;font-weight:500;display:inline-block;margin:4px}
.chip.on{background:#312e81;border-color:var(--pr);color:var(--pr);font-weight:700}
.av{width:48px;height:48px;border-radius:50%;background:var(--s2);border:2px solid transparent;font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin:4px}
.av.on{border-color:var(--pr);background:#312e81}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.sv{font-size:17px;font-weight:800;margin-bottom:4px}
.sl{font-size:11px;color:var(--mu)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px}
.ti{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer}
.ti:active{opacity:.7}
.ti .ic{font-size:24px;margin-bottom:8px}
.ti .tt{font-size:13px;font-weight:700;margin-bottom:4px}
.ti .ts{font-size:11px;color:var(--mu)}
.ti .tg2{font-size:10px;margin-top:6px;font-weight:600}
.ir{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.rb{background:none;border:none;color:var(--dm);font-size:16px;cursor:pointer;padding:4px 8px;flex-shrink:0}
.gb{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:none;border-radius:14px;padding:16px;width:100%;cursor:pointer;margin-top:12px}
.gl{font-size:18px;font-weight:900;color:#4285F4}
.gt{font-size:15px;font-weight:700;color:#1f1f1f}
.dv{display:flex;align-items:center;gap:12px;margin:16px 0}
.dl{flex:1;height:1px;background:var(--b2)}
.dt{font-size:12px;color:var(--dm)}
.ss{display:flex;justify-content:space-around;padding:14px;background:var(--sf);border-bottom:1px solid var(--bd)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:var(--tx);padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;border:1px solid var(--b2);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.es{text-align:center;padding:60px 32px}
.sl2{font-size:10px;color:var(--dm);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:16px 12px 8px}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px;text-align:center;overflow-y:auto}
.wf{border-left:2px solid var(--b2);padding:12px 0 12px 16px;margin-left:8px;position:relative}
.wfd{position:absolute;left:-6px;top:16px;width:10px;height:10px;border-radius:50%}
.bb{color:var(--pr);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:4px}
.sd{display:flex;align-items:center;justify-content:center;padding:16px 0;gap:0}
.dot{width:10px;height:10px;border-radius:50%;background:var(--s2);border:1px solid var(--b2)}
.dot.on{background:var(--pr);border-color:var(--pr)}
.dl2{width:40px;height:2px;background:var(--b2)}
.fs{padding:20px;overflow-y:auto;height:100%}
.kb{display:none;position:fixed;top:0;left:0;width:100%;background:#1e293b;border-bottom:1px solid var(--b2);z-index:9999;padding:8px 16px;justify-content:flex-end;align-items:center}
.kb.on{display:flex}
.kd{background:var(--pr);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer}
.kl{flex:1;font-size:13px;color:var(--mu)}
.gsb{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:14px;margin-top:12px;font-size:12px;color:var(--mu);line-height:1.6}
.pw{background:#0d1f3c;border:1px solid #1e3a5f;border-radius:12px;padding:14px;margin-bottom:14px;display:none}
.psg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ps{background:#0a1628;border-radius:8px;padding:10px;text-align:center}
.ps .pv{font-size:13px;font-weight:800}
.ps .pl{font-size:10px;color:var(--dm);margin-top:3px}
.or-box{background:var(--s2);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--b2)}
.or-lbl{font-size:11px;color:var(--dm);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body style="background:#0d1117;margin:0;padding:0">
<div id="kb-bar" class="kb">
  <span id="kb-lbl" class="kl">Editing</span>
  <button class="kd" onclick="dkb()">Done ✓</button>
</div>
<div id="app" style="min-height:100vh;background:#0d1117"></div>
<div id="toast" class="toast"></div>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
var S = {
  user: null, tab: 'home',
  loans: [], cards: [], expenses: {}, incomes: {}, goals: [],
  reg: {name:'',email:'',phone:'',city:'',occ:'Salaried Employee',av:'👨',budget:''}
};
var AVTS = ['👨','👩','🧑','👨‍💼','👩‍💼','🧑‍💻','👨‍🍳','👩‍🎓'];
var OCCS = ['Salaried Employee','Self Employed','Business Owner','Freelancer','Student','Retired','Other'];
var ISRC = ['Salary','Freelance','Business','Rental Income','Investment Returns','Bonus','Other'];
var CATS = ['Electricity','Gas','Water','Broadband','Mobile Bill','Groceries','Rent','Petrol','Medicine','School Fees','OTT Subscriptions','Other'];
var BNKS = ['SBI','HDFC','ICICI','AXIS','KOTAK','IDFC','YES BANK','INDUSIND','BOB','PNB','OTHER'];
var CCR  = {SBI:42,HDFC:43.2,ICICI:42,AXIS:52.86,KOTAK:36,IDFC:39,'YES BANK':42,INDUSIND:43.2,BOB:30,PNB:30,OTHER:42};
var GCI  = '';

// ─── Storage ──────────────────────────────────────────────────────────────────
function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function userKey(k){
  // Namespace all data keys by user ID so each user has isolated storage
  return S.user ? 'fOs_'+k+'_'+S.user.id : 'fOs_'+k+'_anon';
}
function ldAll(){
  S.user=ld('fOs_u',null);
  if(!S.user) return;
  S.loans   =ld(userKey('l'),[]);
  S.cards   =ld(userKey('c'),[]);
  S.expenses=ld(userKey('e'),{});
  S.incomes =ld(userKey('i'),{});
  S.goals   =ld(userKey('g'),[]);
}
function svAll(){
  if(!S.user) return;
  sv(userKey('l'),S.loans);sv(userKey('c'),S.cards);
  sv(userKey('e'),S.expenses);sv(userKey('i'),S.incomes);sv(userKey('g'),S.goals);
  // Auto-push to cloud after local save (non-blocking)
  setTimeout(cloudPush, 300);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtINR(n){
  var v=Number(n)||0;
  if(v>=10000000) return '\u20b9'+(v/10000000).toFixed(1)+'Cr';
  if(v>=100000)   return '\u20b9'+(v/100000).toFixed(1)+'L';
  return '\u20b9'+Math.round(v).toLocaleString('en-IN');
}
function mk(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}
function simpleHash(str){
  // Simple deterministic hash — not cryptographic but sufficient for local PIN
  var h=0,i,c;
  for(i=0;i<str.length;i++){c=str.charCodeAt(i);h=((h<<5)-h)+c;h=h&h;}
  return String(Math.abs(h));
}
function simpleHash(s){
  // djb2 hash — fast, deterministic, good enough for PIN protection on device
  var h=5381;
  for(var i=0;i<s.length;i++){
    h=((h<<5)+h)+s.charCodeAt(i);
    h=h&h; // force 32-bit int
  }
  return (h>>>0).toString(36); // unsigned, base36 string
}
function ordSuffix(d){
  var s=['th','st','nd','rd'],v=d%100;
  return s[(v-20)%10]||s[v]||s[0];
}
function calcEMI(p,r,n){
  if(!n||n<=0) return 0;
  if(!r||r<=0) return p/n;
  var mr=r/12/100;
  return p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);
}
function calcBal(p,r,n,paid){
  if(paid>=n) return 0;
  if(!r||r<=0) return Math.max(0,p-(p/n)*paid);
  var mr=r/12/100,emi=calcEMI(p,r,n);
  return Math.max(0,p*Math.pow(1+mr,paid)-emi*((Math.pow(1+mr,paid)-1)/mr));
}
function calcRateFromEMI(p,emi,n){
  if(!emi||!n||!p||emi*n<=p) return 0;
  var mr=0.01;
  for(var i=0;i<100;i++){
    var ex=Math.pow(1+mr,n);
    var f=p*mr*ex/(ex-1)-emi;
    var df=p*(ex*(1+mr*n)-ex)/Math.pow(ex-1,2);
    if(!df) break;
    var mr2=mr-f/df;
    if(Math.abs(mr2-mr)<1e-10){mr=mr2;break;}
    mr=Math.max(mr2,0.00001);
  }
  return Math.max(0,Math.round(mr*12*100*100)/100);
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
function dkb(){if(document.activeElement)document.activeElement.blur();document.getElementById('kb-bar').classList.remove('on');}
document.addEventListener('focusin',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){
    var l=e.target.previousElementSibling;
    document.getElementById('kb-lbl').textContent=(l&&l.tagName==='LABEL')?l.textContent:'Tap Done to close';
    document.getElementById('kb-bar').classList.add('on');
  }
});
document.addEventListener('focusout',function(){
  setTimeout(function(){
    var a=document.activeElement;
    if(!a||!(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.tagName==='SELECT'))
      document.getElementById('kb-bar').classList.remove('on');
  },200);
});
document.addEventListener('touchstart',function(e){
  if(e.target.id==='modal-overlay') dkb();
},true);

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(html){
  var el=document.getElementById('modal-overlay');
  if(!el){el=document.createElement('div');el.id='modal-overlay';el.className='mo';document.body.appendChild(el);}
  el.innerHTML='<div class="ms">'+html+'</div>';
  el.classList.add('open');
  pushNav({type:'modal'});
  el.onclick=function(ev){if(ev.target===el){dkb();closeModal();}};
}
function closeModal(){var el=document.getElementById('modal-overlay');if(el){el.classList.remove('open');el.innerHTML='';}}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  var el=document.getElementById('app');
  if(!el) return;
  el.innerHTML=S.user?'<div class="scr">'+screen()+'</div>'+tabBar():auth();
  setTimeout(function(){
    if(document.getElementById('gbl')) showGB('gbl');
    if(document.getElementById('gbr')) showGB('gbr');
  },80);
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
var authStep='splash';
function auth(){
  if(authStep==='splash') return splash();
  if(authStep==='login')  return login();
  if(authStep==='reg1')   return reg1();
  if(authStep==='reg2')   return reg2();
  return splash();
}
function goAuth(s){authStep=s;render();pushNav({type:'auth',step:s});}

function splash(){
  return '<div class="splash">'
    +'<div style="font-size:72px;margin-bottom:16px">\uD83D\uDCB0</div>'
    +'<h1 style="font-size:32px;font-weight:800;color:var(--pr);margin-bottom:8px">FinanceOS</h1>'
    +'<p style="color:var(--mu);font-size:14px;margin-bottom:36px">Your Personal Finance Manager</p>'
    +'<div style="width:100%;margin-bottom:36px">'
    +['<span>\uD83C\uDFE6</span><span>Track loans &amp; EMIs</span>','<span>\uD83D\uDCB3</span><span>Manage credit cards</span>','<span>\uD83E\uDDFE</span><span>Monitor expenses</span>','<span>\uD83D\uDCCA</span><span>Smart financial insights</span>'].map(function(f){return '<div style="display:flex;align-items:center;gap:14px;padding:8px 0;font-size:15px;font-weight:500">'+f+'</div>';}).join('')
    +'</div>'
    +'<button class="btn" onclick="goAuth(\'reg1\')">🚀 Create Account</button>'
    +'<button class="btn btn-o" style="margin-top:10px" onclick="goAuth(\'login\')">Sign In</button>'
    +'<p style="margin-top:24px;font-size:11px;color:var(--dm)">Your data stays private on this device</p>'
    +'</div>';
}

function login(){
  return '<div class="fs" style="padding-top:60px">'
    +'<button class="bb" onclick="goAuth(\'splash\')">← Back</button>'
    +'<div style="text-align:center;padding:28px 0">'
    +'<div style="font-size:48px">\uD83D\uDCB0</div>'
    +'<h2 style="margin-top:10px">Welcome back</h2>'
    +'<p style="color:var(--mu);font-size:13px;margin-top:6px">Sign in to continue</p>'
    +'</div>'
    +'<div id="gbl"></div>'
    +'<div class="dv"><div class="dl"></div><span class="dt">or sign in with email</span><div class="dl"></div></div>'
    +'<label>Email Address</label>'
    +'<input id="li-em" type="email" inputmode="email" enterkeyhint="next" placeholder="your@email.com"/>'
    +'<label>4-digit PIN</label>'
    +'<input id="li-pin" type="password" inputmode="numeric" maxlength="4" enterkeyhint="done" placeholder="Enter your PIN"/>'
    +'<button class="btn" onclick="doLogin()">Sign In</button>'
    +'<p style="text-align:center;margin-top:12px;font-size:12px;color:var(--dm)">Forgot PIN? Your data is stored only on this device.</p>'
    +'<p style="text-align:center;margin-top:20px;font-size:14px;color:var(--mu)">No account? <span style="color:var(--pr);font-weight:700;cursor:pointer" onclick="goAuth(\'reg1\')">Create one</span></p>'
    +'</div>';
}

function reg1(){
  var f=S.reg;
  return '<div class="fs" style="padding-top:60px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<button class="bb" onclick="goAuth(\'splash\')">← Back</button>'
    +'<span style="font-size:13px;color:var(--mu)">Step 1/2</span>'
    +'</div>'
    +'<div class="sd"><div class="dot on"></div><div class="dl2"></div><div class="dot"></div></div>'
    +'<h2 style="font-size:20px;font-weight:800;margin-bottom:4px">👤 Personal Details</h2>'
    +'<p style="color:var(--mu);font-size:13px;margin-bottom:16px">Tell us about yourself</p>'
    +'<label>Choose Avatar</label>'
    +'<div style="margin:10px 0 16px">'+AVTS.map(function(a){return '<button class="av'+(f.av===a?' on':'')+'" onclick="setAv(\''+a+'\')">'+a+'</button>';}).join('')+'</div>'
    +'<label>Full Name *</label>'
    +'<input id="rn" type="text" enterkeyhint="next" autocapitalize="words" placeholder="e.g. Ramesh Kumar" value="'+esc(f.name)+'"/>'
    +'<label>Email Address *</label>'
    +'<input id="re" type="email" inputmode="email" enterkeyhint="next" placeholder="you@gmail.com" value="'+esc(f.email)+'"/>'
    +'<label>Mobile (optional)</label>'
    +'<input id="rp" type="tel" inputmode="tel" enterkeyhint="next" placeholder="10-digit mobile" maxlength="10" value="'+esc(f.phone)+'"/>'
    +'<label>City (optional)</label>'
    +'<input id="rc" type="text" enterkeyhint="done" placeholder="e.g. Bangalore" value="'+esc(f.city)+'"/>'
    +'<button class="btn" onclick="goReg2()">Continue →</button>'
    +'<div class="dv"><div class="dl"></div><span class="dt">or</span><div class="dl"></div></div>'
    +'<div id="gbr"></div>'
    +'</div>';
}

function reg2(){
  var f=S.reg;
  return '<div class="fs" style="padding-top:60px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<button class="bb" onclick="goAuth(\'reg1\')">← Previous</button>'
    +'<span style="font-size:13px;color:var(--mu)">Step 2/2</span>'
    +'</div>'
    +'<div class="sd"><div class="dot on"></div><div class="dl2" style="background:var(--pr)"></div><div class="dot on"></div></div>'
    +'<h2 style="font-size:20px;font-weight:800;margin-bottom:4px">💼 Financial Profile</h2>'
    +'<p style="color:var(--mu);font-size:13px;margin-bottom:16px">Personalise your dashboard</p>'
    +'<label>Occupation</label>'
    +'<div style="margin:10px 0 16px">'+OCCS.map(function(o){return '<div class="chip'+(f.occ===o?' on':'')+'" onclick="setOcc(\''+o+'\')">'+o+'</div>';}).join('')+'</div>'
    +'<label>Set a 4-digit PIN * (secures your account)</label>'
    +'<input id="rpin" type="password" inputmode="numeric" maxlength="4" enterkeyhint="next" placeholder="e.g. 1234"/>'
    +'<label>Confirm PIN *</label>'
    +'<input id="rpin2" type="password" inputmode="numeric" maxlength="4" enterkeyhint="done" placeholder="Re-enter PIN"/>'
    +'<label>Monthly Budget (\u20b9) — optional</label>'
    +'<input id="rb" type="number" inputmode="decimal" enterkeyhint="done" placeholder="e.g. 80000"/>'
    +'<div style="background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;gap:14px">'
    +'<span style="font-size:40px">'+f.av+'</span>'
    +'<div><div style="font-size:16px;font-weight:700">'+esc(f.name||'Your Name')+'</div>'

  ldAll();
  notify(nu,users.length+1);
  render();
  toast('Welcome, '+nu.name.split(' ')[0]+'! 🎉');
  // Push user profile to cloud so they can log in from any device
  setTimeout(async function(){

}

async function doLogin(){
  var em=((document.getElementById('li-em')||{}).value||'').trim().toLowerCase();
  var pin=((document.getElementById('li-pin')||{}).value||'').trim();
  if(!em||em.indexOf('@')<0){toast('Enter a valid email');return;}
  if(!pin||pin.length!==4){toast('Enter your 4-digit PIN');return;}

  // Lockout check
  var lockKey='fOs_lock_'+em;
  var lockData=ld(lockKey,{attempts:0,until:0});
  if(lockData.until>Date.now()){
    var mins=Math.ceil((lockData.until-Date.now())/60000);
    toast('🔒 Account locked. Try again in '+mins+' min');return;
  }

  // Check local first, then cloud
  toast('🔍 Looking up your account...');
  var found = await findUserByEmail(em);
  if(!found){
    toast('No account found — please register');
    goAuth('reg1');return;
  }

  // PIN check
  if(found.pin && found.pin!==simpleHash(pin+String(found.id))){
    lockData.attempts=(lockData.attempts||0)+1;
    var left=5-lockData.attempts;
    if(lockData.attempts>=5){
      lockData.until=Date.now()+30*60*1000;
      lockData.attempts=0;
      sv(lockKey,lockData);
      toast('🔒 Too many attempts. Locked for 30 minutes.');
    } else {
      sv(lockKey,lockData);
      toast('❌ Wrong PIN — '+left+' attempt'+(left===1?'':'s')+' left');
    }
    return;
  }

  // Success
  sv(lockKey,{attempts:0,until:0});
  sv('fOs_u',found);S.user=found;ldAll();
  render();
  toast('Welcome back, '+found.name.split(' ')[0]+'! 👋');
  setTimeout(async function(){
    await pushUsers(); // ensure this device's user list is in cloud
    var updated = await cloudPull();
    if(updated){ render(); toast('☁️ Data synced from cloud!'); }
  }, 500);
}

// ─── Google Auth ──────────────────────────────────────────────────────────────
function initGSI(){
  var cid=ld('fOs_gcid','');
  GCI=cid;
  if(!cid) return;
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGSI,500);return;}
  try{google.accounts.id.initialize({client_id:cid,callback:onGCred,auto_select:false,cancel_on_tap_outside:true});}
  catch(e){console.log('GSI init:',e);}
}
function onGCred(resp){
  try{
    var parts=resp.credential.split('.');
    var pad=parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while(pad.length%4) pad+='=';
    var payload=JSON.parse(atob(pad));
    var email=payload.email,name=payload.name,pic=payload.picture||'';
    if(!email||!name){toast('Could not get Google info');return;}
    var users=ld('fOs_us',[]);
    var found=users.find(function(u){return u.email.toLowerCase()===email.toLowerCase();});
    if(!found){
      var avs=['👨','👩','🧑','👨‍💼','👩‍💼','🧑‍💻'];
      found={id:Date.now(),name:name,email:email,phone:'',city:'',occ:'Other',av:avs[name.charCodeAt(0)%avs.length],pic:pic,provider:'google',createdAt:new Date().toISOString()};
      sv('fOs_us',users.concat([found]));
      notify(found,users.length+1);
      toast('Welcome, '+name.split(' ')[0]+'! 🎉');
    } else {
      found.name=name;found.pic=pic;
      var idx=users.findIndex(function(u){return u.id===found.id;});
      if(idx>=0)users[idx]=found;
      sv('fOs_us',users);
      toast('Welcome back, '+name.split(' ')[0]+'! 👋');
    }
    sv('fOs_u',found);S.user=found;authStep='splash';ldAll();render();
  }catch(e){console.error('GSI cred:',e);toast('Sign-in failed. Try again.');}
}

  var cid=ld('fOs_gcid','');

  try{google.accounts.id.renderButton(el,{theme:'filled_black',size:'large',shape:'rectangular',width:Math.min(window.innerWidth-48,432),text:'continue_with',logo_alignment:'left'});}

// ─── STATS ────────────────────────────────────────────────────────────────────
function stats(){
  var m=mk();
  var inc=(S.incomes[m]||[]).reduce(function(s,i){return s+Number(i.amt||0);},0);
  var emi=S.loans.reduce(function(s,l){return s+(l.emi||calcEMI(l.amt,l.rate,l.ten));},0);
  var cc=S.cards.reduce(function(s,c){return s+Math.max(Number(c.bal||0)*0.05,200);},0);
  var exp=(S.expenses[m]||[]).reduce(function(s,e){return s+Number(e.amt||0);},0);
  var sav=inc-emi-cc-exp;
  var debt=S.loans.reduce(function(s,l){return s+calcBal(l.amt,l.rate,l.ten,l.paid||0);},0)
          +S.cards.reduce(function(s,c){return s+Number(c.bal||0);},0);
  var score=100;
  if(inc>0){var dti=emi/inc*100;if(dti>50)score-=30;else if(dti>40)score-=15;else if(dti>30)score-=5;}
  if(debt>inc*12)score-=20;
  if(S.cards.some(function(c){return Number(c.bal)>50000;}))score-=10;
  score=Math.max(0,Math.min(100,score));
  var sc=score>=70?'var(--gn)':score>=40?'var(--or)':'var(--rd)';

  var h='<div class="hdr"><h1>📊 Statistics</h1></div>'
    +'<div class="sg">'
    +'<div class="sc"><div class="sv" style="color:var(--rd)">'+fmtINR(debt)+'</div><div class="sl">Total Debt</div></div>'
    +'<div class="sc"><div class="sv" style="color:'+(sav>=0?'var(--gn)':'var(--rd)')+'">'+fmtINR(sav)+'</div><div class="sl">Monthly Savings</div></div>'
    +'<div class="sc"><div class="sv" style="color:'+sc+'">'+score+'/100</div><div class="sl">Health Score</div></div>'
    +'<div class="sc"><div class="sv" style="color:var(--pr)">'+(inc>0?((emi/inc)*100).toFixed(0):0)+'%</div><div class="sl">EMI/Income</div></div>'
    +'</div>'
    +'<div class="card"><div class="ct">Monthly Outflow</div>';
  [['Loan EMIs',emi,'var(--pr)'],['CC Min Dues',cc,'var(--pk)'],['Expenses',exp,'var(--or)']].forEach(function(x){
    h+='<div class="row" style="margin-bottom:6px"><span style="font-size:13px;color:var(--mu)">'+x[0]+'</span><span style="font-size:13px;font-weight:700;color:'+x[2]+'">'+fmtINR(x[1])+'</span></div>'
      +'<div class="bt" style="margin-bottom:10px"><div class="bf" style="width:'+(inc>0?(x[1]/inc*100):0)+'%;background:'+x[2]+'"></div></div>';
  });
  h+='</div>';
  if(S.loans.length){
    h+='<div class="card"><div class="ct">🎯 Avalanche Strategy</div>';
    var sorted=[].concat(S.loans).sort(function(a,b){return b.rate-a.rate;});
    sorted.forEach(function(l,i){
      h+='<div style="padding:10px 0;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px">'
        +(i===0?'<span style="background:var(--rd);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px">PAY FIRST</span>':'<span style="color:var(--dm);font-size:12px">#'+(i+1)+'</span>')
        +'<span style="flex:1;font-size:13px;font-weight:600">'+esc(l.name)+'</span>'
        +'<span style="font-size:12px;color:var(--rd)">'+l.rate.toFixed(2)+'%</span>'
        +'</div>';
    });
    h+='</div>';
  }
  return h;
}

function doResetPIN(){
  var em=((document.getElementById('fp-em')||{}).value||'').trim().toLowerCase();
  var p1=((document.getElementById('fp-p1')||{}).value||'').trim();
  var p2=((document.getElementById('fp-p2')||{}).value||'').trim();
  if(!em||em.indexOf('@')<0){toast('Enter your registered email');return;}
  if(!p1||p1.length!==4||!/^\d{4}$/.test(p1)){toast('PIN must be exactly 4 digits');return;}
  if(p1!==p2){toast('PINs do not match');return;}
  var users=ld('fOs_us',[]);
  var idx=users.findIndex(function(u){return u.email.toLowerCase()===em;});
  if(idx<0){toast('No account found with this email');return;}

function lCalc(){
  var a=Number((document.getElementById('la')||{}).value)||0;
  var t=Number((document.getElementById('lt')||{}).value)||0;
  var emi=Number((document.getElementById('lemi')||{}).value)||0;
  var r=Number((document.getElementById('lr')||{}).value)||0;
  if(emi>0&&a>0&&t>0){var cr=calcRateFromEMI(a,emi,t);var rEl=document.getElementById('lr');if(rEl)rEl.value=cr;lPrev(a,cr,t,emi);}
  else if(r>0&&a>0&&t>0){var ce=calcEMI(a,r,t);var eEl=document.getElementById('lemi');if(eEl)eEl.value=Math.round(ce);lPrev(a,r,t,ce);}
  else lHidePrev();
}
function lEmiChg(){
  var a=Number((document.getElementById('la')||{}).value)||0;
  var t=Number((document.getElementById('lt')||{}).value)||0;
  var emi=Number((document.getElementById('lemi')||{}).value)||0;
  if(a>0&&t>0&&emi>0){var r=calcRateFromEMI(a,emi,t);var rEl=document.getElementById('lr');if(rEl)rEl.value=r;lPrev(a,r,t,emi);}
  else lHidePrev();
}
function lRateChg(){
  var a=Number((document.getElementById('la')||{}).value)||0;
  var t=Number((document.getElementById('lt')||{}).value)||0;
  var r=Number((document.getElementById('lr')||{}).value)||0;
  if(a>0&&t>0&&r>0){var emi=calcEMI(a,r,t);var eEl=document.getElementById('lemi');if(eEl)eEl.value=Math.round(emi);lPrev(a,r,t,emi);}
  else lHidePrev();
}
function lPrev(a,r,t,emi){
  var el=document.getElementById('lprev');if(!el)return;
  var tp=emi*t,ti=tp-a;
  el.style.display='block';
  el.innerHTML='<p style="font-size:11px;color:var(--bl);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">📊 LOAN PREVIEW</p><div class="psg">'
    +ps('Monthly EMI','\u20b9'+Math.round(emi).toLocaleString('en-IN'),'var(--pr)')
    +ps('Interest Rate',r.toFixed(2)+'% p.a.','var(--or)')
    +ps('Total Payment','\u20b9'+Math.round(tp).toLocaleString('en-IN'),'var(--tx)')
    +ps('Total Interest','\u20b9'+Math.round(ti).toLocaleString('en-IN'),'var(--rd)')
    +ps('Tenure',(t>=12?(Math.floor(t/12)+'yr '+(t%12?t%12+'mo':'')):''+t+'mo'),'var(--mu)')
    +ps('Interest %',(ti/a*100).toFixed(1)+'% of loan','var(--pk)')
    +'</div>';
}
function ps(l,v,c){return '<div class="ps"><div class="pv" style="color:'+c+'">'+v+'</div><div class="pl">'+l+'</div></div>';}
function lHidePrev(){var el=document.getElementById('lprev');if(el)el.style.display='none';}

function saveLoan(){
  var n=((document.getElementById('ln')||{}).value||'').trim();
  var a=Number((document.getElementById('la')||{}).value);
  var t=Number((document.getElementById('lt')||{}).value);
  var r=Number((document.getElementById('lr')||{}).value)||0;
  var emiIn=Number((document.getElementById('lemi')||{}).value)||0;
  var p=Number((document.getElementById('lp')||{}).value)||0;
  var dd=window._dueDay||0;
  if(!n){toast('Loan name is required');return;}
  if(!dd){toast('Please select an EMI due date');return;}
  if(!a||a<=0){toast('Enter a valid principal amount');return;}
  if(!t||t<=0){toast('Enter tenure in months');return;}
  if(p<0||p>t){toast('Months paid cannot exceed tenure');return;}
  var fEMI,fRate;
  if(emiIn>0){fEMI=emiIn;fRate=calcRateFromEMI(a,emiIn,t);}
  else if(r>0){fRate=r;fEMI=Math.round(calcEMI(a,r,t));}
  else{fRate=0;fEMI=Math.round(a/t);}
  if(fEMI<=0){toast('Could not calculate EMI');return;}

  if(paid && S.loans[i].paid<S.loans[i].ten){

    if(S.loans[i].lastPaidMk!==m){

      S.loans[i].lastPaidMk=m;

    // Undo this month's increment
    S.loans[i].paid=Math.max(0,(S.loans[i].paid||0)-1);

  }
  svAll();render();

// ─── Android Back Button / Browser Back Navigation ───────────────────────────
function pushNav(state){
  // Push a history entry so back button has something to intercept
  history.pushState(state||{}, '');
}

window.addEventListener('popstate', function(e){
  // Priority 1: keyboard open → dismiss keyboard
  var kbBar = document.getElementById('kb-bar');
  if(kbBar && kbBar.classList.contains('on')){
    dkb();
    pushNav({type:'app'}); // re-push so next back still works
    return;
  }

  // Priority 2: modal open → close modal
  var modal = document.getElementById('modal-overlay');
  if(modal && modal.classList.contains('open')){
    dkb(); closeModal();
    pushNav({type:'app'});
    return;
  }

  // Priority 3: on a tab other than home → go to home
  if(S.user && S.tab !== 'home'){
    S.tab = 'home'; render();
    pushNav({type:'app'});
    return;
  }

  // Priority 4: on auth sub-screen → go back one auth step
  if(!S.user && authStep !== 'splash'){
    var prev = {login:'splash', reg1:'splash', reg2:'reg1'}[authStep] || 'splash';
    goAuth(prev);
    pushNav({type:'app'});
    return;
  }

  // Priority 5: home screen with user → show exit confirmation
  if(S.user && S.tab === 'home'){
    showExitConfirm();
    pushNav({type:'app'}); // re-push so if they cancel, back still works
    return;
  }

  // Splash screen — allow exit
});

function showExitConfirm(){
  // Lightweight exit toast instead of heavy modal
  var existing = document.getElementById('exit-toast');
  if(existing){ existing.remove(); doExitApp(); return; } // double-back = exit

  var el = document.createElement('div');
  el.id = 'exit-toast';
  el.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);'
    +'background:#1e293b;border:1px solid var(--b2);border-radius:14px;padding:14px 20px;'
    +'font-size:14px;font-weight:600;color:var(--tx);z-index:9999;'
    +'display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px #0008;'
    +'animation:slideUp .2s ease;white-space:nowrap';
  el.innerHTML = '<span>Press back again to exit</span>'
    +'<button onclick="doExitApp()" style="background:var(--rd);border:none;color:#fff;'
    +'border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer">Exit</button>'
    +'<button onclick="this.parentElement.remove()" style="background:var(--s2);border:1px solid var(--b2);'
    +'color:var(--mu);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer">Stay</button>';
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentElement) el.remove(); }, 3000);
}

function doExitApp(){
  // Best-effort exit for Android WebView / PWA
  window.close();
  // Fallback for browsers that block window.close()
  history.go(-(history.length));
}

// Push initial state on load so first back press is intercepted
window.addEventListener('load', function(){
  pushNav({type:'app'});
});

// ─── Due Date Alert System ────────────────────────────────────────────────────
function checkDueAlerts(){
  var today=new Date();
  var tomorrow=new Date(today);
  tomorrow.setDate(tomorrow.getDate()+1);
  var tmDay=tomorrow.getDate();
  var tmMonth=tomorrow.getMonth();
  var tmYear=tomorrow.getFullYear();

  var alerts=[];

  // Check loans
  S.loans.forEach(function(l){
    if(!l.dueDay) return;
    var bal=calcBal(l.amt,l.rate,l.ten,l.paid||0);
    if(bal<=0) return; // fully paid
    if(l.dueDay===tmDay){
      alerts.push({
        type:'loan',icon:'🏦',name:l.name,
        msg:'EMI of '+fmtINR(l.emi||calcEMI(l.amt,l.rate,l.ten))+' due tomorrow ('+tmDay+ordSuffix(tmDay)+')',
        color:'var(--pr)',dueDay:l.dueDay
      });
    }
  });

  // Check credit cards (use card's dueDay if set)
  S.cards.forEach(function(c){
    if(!c.dueDay) return;
    if(Number(c.bal||0)<=0) return;
    if(c.dueDay===tmDay){
      var minDue=Math.max(Number(c.bal)*0.05,200);
      alerts.push({
        type:'card',icon:'💳',name:c.bank+' ••'+(c.last4||''),
        msg:'Min due of '+fmtINR(minDue)+' tomorrow ('+tmDay+ordSuffix(tmDay)+')',
        color:'var(--pk)',dueDay:c.dueDay
      });
    }
  });

  return alerts;
}

function showDueAlertBanner(){
  var alerts=checkDueAlerts();
  var existing=document.getElementById('due-alert-bar');
  if(existing) existing.remove();
  if(!alerts.length) return;

  var bar=document.createElement('div');
  bar.id='due-alert-bar';
  bar.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:9000;';

  bar.innerHTML=alerts.map(function(a,i){
    return '<div style="background:#1a0a00;border-bottom:2px solid var(--or);padding:12px 16px;display:flex;align-items:center;gap:10px;animation:slideDown .3s ease">'
      +'<span style="font-size:22px">'+a.icon+'</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:12px;font-weight:800;color:var(--or)">⚠️ PAYMENT DUE TOMORROW</div>'

      +'<div style="font-size:11px;color:var(--mu);margin-top:1px">'+a.msg+'</div>'
      +'</div>'

function showUpcomingDues(){
  var today=new Date().getDate();
  var upcoming=[];

  S.loans.forEach(function(l){
    if(!l.dueDay) return;
    var bal=calcBal(l.amt,l.rate,l.ten,l.paid||0);
    if(bal<=0) return;
    var diff=l.dueDay-today;
    if(diff<0) diff+=28; // next month approx
    upcoming.push({days:diff,icon:'🏦',name:l.name,amt:l.emi||calcEMI(l.amt,l.rate,l.ten),color:'var(--pr)',dueDay:l.dueDay});
  });

  S.cards.forEach(function(c){
    if(!c.dueDay||Number(c.bal||0)<=0) return;
    var diff=c.dueDay-today;
    if(diff<0) diff+=28;
    upcoming.push({days:diff,icon:'💳',name:c.bank+' ••'+(c.last4||''),amt:Math.max(Number(c.bal)*0.05,200),color:'var(--pk)',dueDay:c.dueDay});
  });

  upcoming.sort(function(a,b){return a.days-b.days;});

  if(!upcoming.length){
    openModal('<div class="mh"></div><div class="mt">📅 Upcoming Dues</div>'
      +'<div class="es"><div style="font-size:48px">✅</div><div style="margin-top:12px;font-size:16px;font-weight:700">No upcoming dues</div>'
      +'<div style="color:var(--mu);font-size:13px;margin-top:6px">Add due dates to your loans &amp; cards to see alerts here</div></div>');
    return;
  }

  var h='<div class="mh"></div><div class="mt">📅 Upcoming Dues</div>'
    +'<p style="font-size:12px;color:var(--mu);margin-bottom:16px">Alert 1 day before each payment due date</p>';

  upcoming.forEach(function(u){
    var urgency=u.days===0?'var(--rd)':u.days===1?'var(--or)':u.days<=5?'var(--or)':'var(--gn)';
    var label=u.days===0?'TODAY':u.days===1?'TOMORROW':'In '+u.days+' days';
    h+='<div style="background:var(--s2);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid '+urgency+'">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<span style="font-size:22px">'+u.icon+'</span>'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:700">'+esc(u.name)+'</div>'
      +'<div style="font-size:12px;color:var(--mu);margin-top:2px">Due on '+u.dueDay+ordSuffix(u.dueDay)+' · '+fmtINR(u.amt)+'</div>'
      +'</div>'
      +'<span style="font-size:11px;font-weight:800;color:'+urgency+';background:'+urgency+'22;padding:4px 10px;border-radius:20px">'+label+'</span>'
      +'</div></div>';
  });

  openModal(h);
}

// REST call to Supabase
async function sbFetch(method, path, body){
  if(!SB.enabled) return null;
  try {
    var res = await fetch(SB.url+'/rest/v1/'+path, {
      method: method,
      headers: {
        'apikey': SB.key,
        'Authorization': 'Bearer '+SB.key,
        'Content-Type': 'application/json',
        'Prefer': method==='POST'?'return=minimal,resolution=merge-duplicates':'',
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if(!res.ok){
      var err = await res.text();
      console.error('Supabase error:', res.status, err);
      return null;
    }
    var text = await res.text();
    return text ? JSON.parse(text) : {};
  } catch(e) {
    console.error('Supabase fetch failed:', e);
    return null;
  }
}

// Push all local data to cloud
async function cloudPush(){
  if(!SB.enabled || !S.user || SB.syncing) return;
  SB.syncing = true;
  showSyncBadge('syncing');
  // Row key = user_id + PIN hash prefix — even with anon key you can't guess another user's row
  var rowKey = String(S.user.id) + '_' + (S.user.pin ? S.user.pin.substring(0,8) : 'gsi');
  var payload = {
    user_id: rowKey,
    email: S.user.email,
    data: JSON.stringify({
      loans: S.loans,
      cards: S.cards,
      expenses: S.expenses,
      incomes: S.incomes,
      goals: S.goals,
    }),
    updated_at: new Date().toISOString(),
  };
  var result = await sbFetch('POST','user_data', payload);
  SB.syncing = false;
  if(result !== null){
    sv('fOs_last_sync', new Date().toISOString());
    showSyncBadge('done');
  } else {
    showSyncBadge('error');
  }
}

// Pull cloud data into local
async function cloudPull(){
  if(!SB.enabled || !S.user) return false;
  showSyncBadge('syncing');
  var rowKey = String(S.user.id) + '_' + (S.user.pin ? S.user.pin.substring(0,8) : 'gsi');
  var rows = await sbFetch('GET','user_data?user_id=eq.'+encodeURIComponent(rowKey)+'&select=data,updated_at');
  if(!rows || !rows.length){
    showSyncBadge('none');
    return false;
  }
  try {
    var remote = JSON.parse(rows[0].data);
    var remoteTime = new Date(rows[0].updated_at).getTime();
    var localTime  = new Date(ld('fOs_last_sync','2000-01-01')).getTime();

    if(remoteTime > localTime){
      // Remote is newer — merge remote into local
      S.loans    = remote.loans    || S.loans;
      S.cards    = remote.cards    || S.cards;
      S.expenses = remote.expenses || S.expenses;
      S.incomes  = remote.incomes  || S.incomes;
      S.goals    = remote.goals    || S.goals;
      svAll(); // save to local too
      sv('fOs_last_sync', rows[0].updated_at);
      showSyncBadge('done');
      return true; // data was updated
    }
    showSyncBadge('done');
    return false;
  } catch(e){
    console.error('cloudPull parse error:', e);
    showSyncBadge('error');
    return false;
  }
}

function showSyncBadge(state){
  var el = document.getElementById('sync-badge');
  if(!el) return;
  var states = {
    syncing: {text:'☁️ Syncing...', color:'var(--mu)'},
    done:    {text:'✅ Synced',     color:'var(--gn)'},
    error:   {text:'⚠️ Sync failed', color:'var(--rd)'},
    none:    {text:'☁️ No cloud data', color:'var(--mu)'},
    off:     {text:'☁️ Cloud off',  color:'var(--dm)'},
  };
  var s = states[state] || states.off;
  el.textContent = s.text;
  el.style.color = s.color;
  if(state==='done') setTimeout(function(){ el.textContent='☁️ Synced'; }, 3000);
}

async function cloudDiagnose(){
  if(!SB.enabled){toast('Cloud not configured');return;}
  var log=[];
  var ts=function(msg){log.push(msg);};

  ts('🔍 Starting diagnostics...');
  ts('URL: '+SB.url.substring(0,40)+'...');
  ts('Key: '+SB.key.substring(0,20)+'...');

  // Test 1: Can we reach user_data table?
  ts('\n[1] Testing user_data table...');
  var r1=await sbFetch('GET','user_data?limit=1');
  if(r1===null) ts('❌ FAIL — cannot read user_data');
  else ts('✅ user_data reachable, rows: '+JSON.stringify(r1).length+' chars');

  // Test 2: Can we reach fos_users table?
  ts('\n[2] Testing fos_users table...');
  var r2=await sbFetch('GET','fos_users?limit=5');
  if(r2===null) ts('❌ FAIL — cannot read fos_users\n   → Run the SQL to create the table!');
  else ts('✅ fos_users reachable, rows found: '+(Array.isArray(r2)?r2.length:'unknown'));

  // Test 3: Try inserting current user
  if(S.user){
    ts('\n[3] Testing insert for: '+S.user.email);
    var r3=await sbFetch('POST','fos_users',{
      user_id:String(S.user.id),
      email:S.user.email.toLowerCase(),
      profile:JSON.stringify(S.user),
      updated_at:new Date().toISOString()
    });
    if(r3===null) ts('❌ INSERT FAILED\n   → Check RLS policy allows insert');
    else ts('✅ Insert OK: '+JSON.stringify(r3).substring(0,60));
  } else {
    ts('\n[3] Skipped — not logged in');
  }

  // Test 4: Read back what's in fos_users
  ts('\n[4] Reading all rows in fos_users...');
  var r4=await sbFetch('GET','fos_users?select=user_id,email,updated_at');
  if(r4===null) ts('❌ Cannot read');
  else if(!r4.length) ts('⚠️ Table is EMPTY — inserts may be silently failing');
  else{
    ts('✅ Found '+r4.length+' user(s):');
    r4.forEach(function(row){ ts('   • '+row.email+' ('+row.updated_at.substring(0,10)+')'); });
  }

  ts('\n--- Done ---');

  openModal(
    '<div class="mh"></div><div class="mt">🔬 Cloud Diagnostics</div>'
    +'<div style="background:#080d18;border-radius:10px;padding:14px;font-family:monospace;font-size:11px;'
    +'color:#4ade80;line-height:1.9;white-space:pre-wrap;max-height:60vh;overflow-y:auto">'
    +log.join('\n').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    +'</div>'
    +'<button class="btn" style="margin-top:12px" onclick="closeModal()">Close</button>'
  );
}


// ─── User Registry Sync ───────────────────────────────────────────────────────
// Push local user list to Supabase users table
async function pushUsers(){
  if(!SB.enabled){ console.log('pushUsers: SB not enabled, url='+SB.url); toast('⚠️ Cloud not enabled'); return; }
  var users = ld('fOs_us',[]);
  if(!users.length){ console.log('pushUsers: no local users'); toast('⚠️ No local users found'); return; }
  console.log('pushUsers: pushing', users.length, 'user(s)', 'to', SB.url);
  toast('☁️ Pushing user to cloud...');
  for(var i=0;i<users.length;i++){
    var u = users[i];
    var r = await sbFetch('POST','fos_users',{
      user_id: String(u.id),
      email: u.email.toLowerCase(),
      profile: JSON.stringify(u),
      updated_at: new Date().toISOString(),
    });
    console.log('pushUsers result for', u.email, ':', r);
    if(r===null){ toast('❌ Failed to push user: '+u.email); }
    else { toast('✅ User synced to cloud: '+u.email); }
  }
  console.log('pushUsers: done');
}

// Pull all users from Supabase into local registry
async function pullUsers(){
  if(!SB.enabled) return;
  var rows = await sbFetch('GET','fos_users?select=profile');
  if(!rows || !rows.length) return;
  var remoteUsers = rows.map(function(r){
    try{ return JSON.parse(r.profile); }catch(e){ return null; }
  }).filter(Boolean);
  if(!remoteUsers.length) return;

  // Merge: keep local users + add any remote users not already local
  var local = ld('fOs_us',[]);
  var localIds = local.map(function(u){ return String(u.id); });
  var merged = local.slice();
  remoteUsers.forEach(function(ru){
    if(!localIds.includes(String(ru.id))) merged.push(ru);
  });
  sv('fOs_us', merged);
}

// Find a user by email — checks local first, then pulls from cloud if not found
async function findUserByEmail(email){
  var users = ld('fOs_us',[]);
  var found = users.find(function(u){ return u.email.toLowerCase()===email; });
  if(found) return found;

  // Not local — pull from cloud and retry
  if(SB.enabled){
    var rows = await sbFetch('GET','fos_users?email=eq.'+encodeURIComponent(email)+'&select=profile');
    if(rows && rows.length){
      try{
        var ru = JSON.parse(rows[0].profile);
        // Save to local registry
        var local = ld('fOs_us',[]);
        if(!local.find(function(u){ return String(u.id)===String(ru.id); })){
          sv('fOs_us', local.concat([ru]));
        }
        return ru;
      }catch(e){}
    }
  }
  return null;
}
